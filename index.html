<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>面部疲劳检测系统</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 MediaPipe 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
    <style>
        @keyframes flash-red {
            0% { background-color: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); }
            50% { background-color: rgba(239, 68, 68, 0.6); border-color: rgba(239, 68, 68, 1); }
            100% { background-color: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); }
        }
        .warning-flash {
            animation: flash-red 1s infinite;
        }
        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 0.75rem;
            overflow: hidden;
            background-color: #1f2937;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #374151;
        }
        canvas {
            width: 100%;
            height: auto;
            max-height: 50vh; 
            object-fit: contain; 
            transform: scaleX(-1); 
        }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex flex-col font-sans">

    <header class="bg-gray-800 p-4 shadow-md flex justify-between items-center z-10 shrink-0">
        <h1 class="text-xl font-bold tracking-wider">AI 疲劳检测</h1>
        <div id="statusIndicator" class="px-3 py-1 rounded-full text-sm font-semibold bg-gray-600">未启动</div>
    </header>

    <main class="flex-1 flex flex-col p-4 w-full max-w-lg mx-auto space-y-4 overflow-y-auto">
        
        <div id="screenContainer" class="canvas-container shadow-lg transition-colors duration-300">
            <video id="inputVideo" playsinline autoplay muted class="hidden"></video>
            <canvas id="outputCanvas"></canvas>
            
            <div id="loadingOverlay" class="absolute inset-0 flex items-center justify-center bg-gray-900 bg-opacity-80 z-10 hidden">
                <div class="text-center">
                    <div class="inline-block animate-spin w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
                    <p class="text-sm text-gray-300">正在加载 AI 模型...</p>
                </div>
            </div>
        </div>

        <!-- 实时数据面板 (改为三列，加入 PERCLOS) -->
        <div class="grid grid-cols-3 gap-2 shrink-0">
            <div class="bg-gray-800 p-2 rounded-lg flex flex-col items-center shadow-inner">
                <span class="text-gray-400 text-[11px] mb-1">闭眼(EAR)</span>
                <span id="earValue" class="text-lg font-mono font-bold text-green-400">0.00</span>
                <span id="earThresholdEl" class="text-gray-500 text-[9px] mt-1 text-center w-full truncate">待校准</span>
            </div>
            <div class="bg-gray-800 p-2 rounded-lg flex flex-col items-center shadow-inner">
                <span class="text-gray-400 text-[11px] mb-1">哈欠(MAR)</span>
                <span id="marValue" class="text-lg font-mono font-bold text-green-400">0.00</span>
                <span class="text-gray-500 text-[9px] mt-1">阈值: > 0.50</span>
            </div>
            <div class="bg-gray-800 p-2 rounded-lg flex flex-col items-center shadow-inner">
                <span class="text-gray-400 text-[11px] mb-1">闭眼占比(5秒)</span>
                <span id="perclosValue" class="text-lg font-mono font-bold text-blue-400">0.0%</span>
                <span class="text-gray-500 text-[9px] mt-1">纯记录 无预警</span>
            </div>
        </div>

        <div class="flex space-x-2 shrink-0">
            <button id="toggleBtn" class="flex-1 py-4 rounded-xl text-lg font-bold bg-blue-600 hover:bg-blue-500 active:bg-blue-700 transition-colors shadow-lg">
                启动摄像头开始检测
            </button>
            <button id="exportBtn" class="hidden px-4 py-4 rounded-xl text-lg font-bold bg-green-600 hover:bg-green-500 active:bg-green-700 transition-colors shadow-lg">
                导出日志
            </button>
        </div>

        <div class="flex-1 min-h-[120px] bg-gray-800 rounded-lg p-3 overflow-hidden flex flex-col shadow-inner">
            <h2 class="text-sm text-gray-400 border-b border-gray-700 pb-2 mb-2">系统日志</h2>
            <ul id="logList" class="flex-1 overflow-y-auto text-xs space-y-2 font-mono text-gray-300 pr-2">
                <li class="text-gray-500">等待启动...</li>
            </ul>
        </div>
    </main>

    <script>
        // DOM 元素
        const videoElement = document.getElementById('inputVideo');
        const canvasElement = document.getElementById('outputCanvas');
        const canvasCtx = canvasElement.getContext('2d');
        const toggleBtn = document.getElementById('toggleBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const screenContainer = document.getElementById('screenContainer');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const earValueEl = document.getElementById('earValue');
        const earThresholdEl = document.getElementById('earThresholdEl');
        const marValueEl = document.getElementById('marValue');
        const perclosValueEl = document.getElementById('perclosValue');
        const logList = document.getElementById('logList');
        const exportBtn = document.getElementById('exportBtn');

        // 状态变量
        let isRunning = false;
        let camera = null;
        let faceMesh = null;
        let sessionStartTime = null; 
        let wakeLock = null; // 屏幕常亮锁

        // 性能降频设置 (约 10 FPS)
        const PROCESS_INTERVAL_MS = 100;
        let lastProcessTime = 0;

        // 疲劳检测阈值与参数
        const EAR_RATIO_THRESHOLD = 0.6; 
        const MAR_THRESHOLD = 0.5;      
        const CLOSED_EYES_TIME = 1000;  
        const HEAD_MOVE_THRESHOLD = 0.05; 

        // 动态校准变量
        let isCalibrating = false;
        let calibrationStartTime = 0;
        let calibrationEARValues = [];
        let baselineEAR = 0;
        let currentEarThreshold = 0.2; 

        // 5秒周期 PERCLOS 记录
        let perclosData = []; // 存放所有5秒区间的平均闭眼占比
        let epochStartTime = 0;
        let currentEpochFrames = 0;
        let currentEpochClosedFrames = 0;

        // 其他计时状态记录
        let eyesClosedStartTime = 0;
        let isEyesClosed = false;
        let lastEyeAlertTime = 0;
        let lastYawnTime = 0;
        let lastHeadMoveTime = 0;
        let lastNosePosition = null;

        // 数据记录数组
        let recordedEvents = [];

        // 屏幕常亮控制 (为1小时长测护航)
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('屏幕防休眠已激活');
                }
            } catch (err) {
                console.warn(`屏幕常亮请求失败: ${err.name}, ${err.message}`);
            }
        }
        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        // 记录事件数据 (a:单次闭眼, b:哈欠, c:大幅运动, p:PERCLOS周期记录, w:PERCLOS严重警告)
        function recordEvent(type, value) {
            recordedEvents.push({
                timestamp: new Date().toISOString(),
                type: type, 
                value: value
            });
        }

        function calculateDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function calculateEAR(landmarks, eyeIndices) {
            const p1 = landmarks[eyeIndices[0]]; const p2 = landmarks[eyeIndices[1]];
            const p3 = landmarks[eyeIndices[2]]; const p4 = landmarks[eyeIndices[3]];
            const p5 = landmarks[eyeIndices[4]]; const p6 = landmarks[eyeIndices[5]];
            const v1 = calculateDistance(p2, p6);
            const v2 = calculateDistance(p3, p5);
            const h = calculateDistance(p1, p4);
            return (v1 + v2) / (2.0 * h);
        }

        function calculateMAR(landmarks) {
            const topLip = landmarks[13]; const bottomLip = landmarks[14];
            const leftCorner = landmarks[78]; const rightCorner = landmarks[308];
            const v = calculateDistance(topLip, bottomLip);
            const h = calculateDistance(leftCorner, rightCorner);
            return v / h;
        }

        function triggerAlert(message, type) {
            const timeStr = new Date().toLocaleTimeString();
            const li = document.createElement('li');
            
            if (type === 'critical') {
                li.innerHTML = `<span class="text-red-400">[${timeStr}] ⚠️ ${message}</span>`;
                screenContainer.classList.add('warning-flash');
                statusIndicator.innerText = "疲劳警告！";
                statusIndicator.className = "px-3 py-1 rounded-full text-sm font-semibold bg-red-600 animate-pulse";
                setTimeout(() => {
                    screenContainer.classList.remove('warning-flash');
                    statusIndicator.innerText = "检测中";
                    statusIndicator.className = "px-3 py-1 rounded-full text-sm font-semibold bg-green-600";
                }, 1500);
            } else if (type === 'warning') {
                li.innerHTML = `<span class="text-orange-400">[${timeStr}] ⚠️ ${message}</span>`;
            } else if (type === 'info') {
                li.innerHTML = `<span class="text-blue-400">[${timeStr}] ℹ️ ${message}</span>`;
            } else {
                li.innerHTML = `<span class="text-yellow-400">[${timeStr}] ⚡ ${message}</span>`;
            }

            logList.prepend(li);
            if (logList.children.length > 50) logList.removeChild(logList.lastChild);
        }

        function onResults(results) {
            if(loadingOverlay.classList.contains('flex')) {
                loadingOverlay.classList.remove('flex');
                loadingOverlay.classList.add('hidden');
                statusIndicator.innerText = "检测中";
                statusIndicator.className = "px-3 py-1 rounded-full text-sm font-semibold bg-green-600";
            }

            canvasElement.width = results.image.width;
            canvasElement.height = results.image.height;
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            const now = Date.now();

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const landmarks = results.multiFaceLandmarks[0];

                drawConnectors(canvasCtx, landmarks, FACEMESH_RIGHT_EYE, {color: '#34d399', lineWidth: 2});
                drawConnectors(canvasCtx, landmarks, FACEMESH_LEFT_EYE, {color: '#34d399', lineWidth: 2});
                drawConnectors(canvasCtx, landmarks, FACEMESH_LIPS, {color: '#f87171', lineWidth: 2});

                // --- 头部运动 ---
                const nose = landmarks[1];
                if (lastNosePosition) {
                    const dx = nose.x - lastNosePosition.x;
                    const dy = nose.y - lastNosePosition.y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    if (distance > HEAD_MOVE_THRESHOLD && (now - lastHeadMoveTime > 2000)) {
                        triggerAlert(`检测到头部大幅度移动！`, 'warning');
                        recordEvent('c', distance.toFixed(3));
                        lastHeadMoveTime = now;
                    }
                }
                lastNosePosition = {x: nose.x, y: nose.y};

                // --- 计算 EAR ---
                const rightEAR = calculateEAR(landmarks, [33, 160, 158, 133, 153, 144]);
                const leftEAR = calculateEAR(landmarks, [362, 385, 387, 263, 373, 380]);
                const avgEAR = (rightEAR + leftEAR) / 2.0;

                if (isCalibrating) {
                    if (calibrationStartTime === 0) {
                        calibrationStartTime = now;
                        triggerAlert("开始校准，请保持正常睁眼直视屏幕2秒...", "info");
                    }
                    calibrationEARValues.push(avgEAR);
                    earValueEl.innerText = avgEAR.toFixed(2);
                    earValueEl.className = "text-lg font-mono font-bold text-yellow-400"; 
                    
                    if (now - calibrationStartTime > 2000 && calibrationEARValues.length > 5) {
                        const sortedEARs = [...calibrationEARValues].sort();
                        const topHalf = sortedEARs.slice(Math.floor(sortedEARs.length / 2));
                        baselineEAR = topHalf.reduce((a, b) => a + b, 0) / topHalf.length;
                        currentEarThreshold = baselineEAR * EAR_RATIO_THRESHOLD;
                        
                        earThresholdEl.innerText = `基准:${baselineEAR.toFixed(2)}`;
                        triggerAlert(`校准完成！闭眼阈值设为 < ${currentEarThreshold.toFixed(2)}`, "info");
                        isCalibrating = false;
                        lastPerclosLogTime = now; // 从此刻起开始心跳计时
                    }
                } else {
                    // --- 常规检测逻辑 ---
                    const isClosed = avgEAR < currentEarThreshold;
                    earValueEl.innerText = avgEAR.toFixed(2);
                    earValueEl.className = `text-lg font-mono font-bold ${isClosed ? 'text-red-500' : 'text-green-400'}`;

                    // 单次闭眼逻辑
                    if (isClosed) {
                        if (!isEyesClosed) {
                            isEyesClosed = true;
                            eyesClosedStartTime = now;
                        } else {
                            const duration = now - eyesClosedStartTime;
                            if (duration >= CLOSED_EYES_TIME && (now - lastEyeAlertTime > 2000)) {
                                triggerAlert(`单次长时间闭眼！`, 'warning');
                                lastEyeAlertTime = now; 
                            }
                        }
                    } else {
                        if (isEyesClosed) {
                            const duration = now - eyesClosedStartTime;
                            if (duration >= CLOSED_EYES_TIME) {
                                recordEvent('a', duration);
                            }
                            isEyesClosed = false;
                        }
                    }

                    // --- 5秒周期 PERCLOS 纯记录实现 ---
                    if (epochStartTime === 0) epochStartTime = now;
                    
                    currentEpochFrames++;
                    if (isClosed) currentEpochClosedFrames++;

                    // 每当时间满 5 秒，计算并保存一次数据
                    if (now - epochStartTime >= 5000) {
                        const perclos = currentEpochFrames > 0 ? (currentEpochClosedFrames / currentEpochFrames) : 0;
                        
                        // 将这 5 秒的结果存入独立数组
                        perclosData.push({
                            timestamp: new Date().toISOString(),
                            value: perclos
                        });

                        // 更新 UI，仅作为中性展示，不标红报警
                        perclosValueEl.innerText = (perclos * 100).toFixed(1) + '%';
                        perclosValueEl.className = 'text-lg font-mono font-bold text-blue-400';

                        // 周期重置，准备记录下一个 5 秒
                        currentEpochFrames = 0;
                        currentEpochClosedFrames = 0;
                        epochStartTime = now;
                    }
                }

                // --- 计算 MAR ---
                const mar = calculateMAR(landmarks);
                marValueEl.innerText = mar.toFixed(2);
                marValueEl.className = `text-lg font-mono font-bold ${mar > MAR_THRESHOLD ? 'text-red-500' : 'text-green-400'}`;

                if (mar > MAR_THRESHOLD && (now - lastYawnTime > 3000)) {
                    triggerAlert(`检测到打哈欠！`, 'warning');
                    recordEvent('b', mar.toFixed(2));
                    lastYawnTime = now;
                }
            } else {
                earValueEl.innerText = "---"; marValueEl.innerText = "---"; perclosValueEl.innerText = "---";
            }
            canvasCtx.restore();
        }

        async function initAI() {
            logList.innerHTML = `<li class="text-blue-400">[${new Date().toLocaleTimeString()}] 正在下载并加载模型...</li>`;
            
            faceMesh = new FaceMesh({locateFile: (file) => {
                return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
            }});
            faceMesh.setOptions({
                maxNumFaces: 1, refineLandmarks: true, 
                minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
            });
            faceMesh.onResults(onResults);

            camera = new Camera(videoElement, {
                onFrame: async () => {
                    // 【降频核心逻辑】每 100ms 投递一帧数据 (约10FPS)
                    // 彻底降低长达一小时运行时的发热量和内存垃圾回收压力
                    const now = Date.now();
                    if (now - lastProcessTime >= PROCESS_INTERVAL_MS) {
                        lastProcessTime = now;
                        await faceMesh.send({image: videoElement});
                    }
                },
                facingMode: 'user' 
            });
        }

        toggleBtn.addEventListener('click', async () => {
            if (!isRunning) {
                try {
                    await requestWakeLock(); // 请求长测防休眠
                    sessionStartTime = new Date();
                    recordedEvents = [];
                    perclosData = []; // 清空之前的独立占此数据
                    epochStartTime = 0;
                    currentEpochFrames = 0;
                    currentEpochClosedFrames = 0;
                    
                    loadingOverlay.classList.remove('hidden');
                    loadingOverlay.classList.add('flex');
                    toggleBtn.innerText = "停止检测";
                    toggleBtn.className = "flex-1 py-4 rounded-xl text-lg font-bold bg-red-600 hover:bg-red-500 active:bg-red-700 transition-colors shadow-lg";
                    exportBtn.classList.remove('hidden');
                    statusIndicator.innerText = "正在启动...";
                    statusIndicator.className = "px-3 py-1 rounded-full text-sm font-semibold bg-yellow-600";

                    isCalibrating = true;
                    calibrationStartTime = 0;
                    calibrationEARValues = [];
                    earThresholdEl.innerText = "待校准...";

                    if (!faceMesh) await initAI();
                    await camera.start();
                    isRunning = true;
                } catch (error) {
                    triggerAlert("启动摄像头失败，请重试。", "critical");
                    toggleBtn.innerText = "启动摄像头开始检测";
                    toggleBtn.className = "flex-1 py-4 rounded-xl text-lg font-bold bg-blue-600 hover:bg-blue-500 active:bg-blue-700 transition-colors shadow-lg";
                    loadingOverlay.classList.add('hidden');
                    loadingOverlay.classList.remove('flex');
                }
            } else {
                if (camera) await camera.stop();
                releaseWakeLock(); // 解除防休眠
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                earValueEl.innerText = "0.00"; marValueEl.innerText = "0.00"; perclosValueEl.innerText = "0.0%";
                toggleBtn.innerText = "启动摄像头开始检测";
                toggleBtn.className = "flex-1 py-4 rounded-xl text-lg font-bold bg-blue-600 hover:bg-blue-500 active:bg-blue-700 transition-colors shadow-lg";
                statusIndicator.innerText = "已停止";
                statusIndicator.className = "px-3 py-1 rounded-full text-sm font-semibold bg-gray-600";
                logList.innerHTML = `<li class="text-gray-500">[${new Date().toLocaleTimeString()}] 系统已暂停。</li>`;
                isRunning = false;
            }
        });

        exportBtn.addEventListener('click', () => {
            if (recordedEvents.length === 0 && perclosData.length === 0) {
                triggerAlert("目前没有记录到任何数据可供导出。", "info");
                return;
            }
            
            const startStr = sessionStartTime ? sessionStartTime.toLocaleString() : "未知";
            const exportStr = new Date().toLocaleString();
            const fileTime = sessionStartTime ? sessionStartTime.getTime() : new Date().getTime();

            // --- 导出 1：突发事件记录表 (单次闭眼, 哈欠, 运动) ---
            if (recordedEvents.length > 0) {
                let csv1 = "data:text/csv;charset=utf-8,\uFEFF";
                csv1 += `本次测试启动时间:,${startStr}\n`;
                csv1 += `数据执行导出时间:,${exportStr}\n`;
                csv1 += `设定降频FPS:,10帧/秒\n\n`;
                csv1 += "时间戳,事件类型,事件代号,数值详情(ms/幅度)\n";
                
                recordedEvents.forEach(e => {
                    let eventName = "";
                    switch(e.type) {
                        case 'a': eventName = '单次长闭眼(时长ms)'; break;
                        case 'b': eventName = '打哈欠(MAR)'; break;
                        case 'c': eventName = '头部大幅度移动(位移)'; break;
                    }
                    csv1 += `${e.timestamp},${eventName},${e.type},${e.value}\n`;
                });
                downloadCSV(csv1, `fatigue_events_start_${fileTime}.csv`);
            }

            // --- 导出 2：严格 5 秒周期 PERCLOS 连续记录表 ---
            if (perclosData.length > 0) {
                let csv2 = "data:text/csv;charset=utf-8,\uFEFF";
                csv2 += `本次测试启动时间:,${startStr}\n`;
                csv2 += `数据执行导出时间:,${exportStr}\n`;
                csv2 += `记录周期:,严格5秒平均\n\n`;
                csv2 += "时间戳,5秒内闭眼占比(PERCLOS)\n";
                
                perclosData.forEach(p => {
                    csv2 += `${p.timestamp},${p.value.toFixed(4)}\n`;
                });
                downloadCSV(csv2, `fatigue_perclos_5s_start_${fileTime}.csv`);
            }
            
            triggerAlert(`成功导出！分为 [事件日志] 与 [连续占比] 两个文件。`, "info");
        });

        // 辅助函数：触发浏览器下载
        function downloadCSV(csvContent, filename) {
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", filename);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

    </script>
</body>
</html>
